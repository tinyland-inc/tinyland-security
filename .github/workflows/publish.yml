name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run without publishing"
        required: false
        type: boolean
        default: true
permissions:
  actions: read
  contents: read
  id-token: write
  packages: write
jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@282fbbf9e44f180bd0703f86275676eb444e971a
    with:
      runner_mode: repo_owned
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: hosted_exception
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "10.13.1"
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test
      build_command: pnpm build
      package_check_command: pnpm check:package
      bazel_targets: "//:pkg //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      npm_publish_mode: disabled
      github_package_name: "@tinyland-inc/tinyland-security"
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets: inherit
