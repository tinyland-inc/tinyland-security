name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the selected ref after validation"
        required: false
        type: boolean
        default: false
permissions:
  actions: read
  contents: read
  packages: write
  id-token: write
jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@53f03268571577260546e0bba850664f8cdaf441
    with:
      runner_mode: shared
      shared_runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: same_runner
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "10.13.1"
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test
      build_command: pnpm build
      package_check_command: pnpm check:package
      bazel_targets: "//:pkg //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      github_package_name: "@tummycrypt/tinyland-security"
      dry_run: ${{ !(github.event_name == 'workflow_dispatch' && inputs.publish == true) }}
      publish_on_tag: true
    secrets: inherit
